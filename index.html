<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WIMPS – MIPS Simulator</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <script>
      // Restore path encoded by 404.html (spa-github-pages redirect trick)
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          });
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded[0] +
            (decoded[1] ? '?' + decoded[1] : '') + l.hash
          );
        }
      }(window.location));

      // Paint the theme background before the JS bundle loads, so reloads show the
      // correct surface instead of a white flash. Mirrors helpers/themeHelper.ts:
      // any cookie value other than "light" is treated as dark.
      (function () {
        var dark = !/(^|;\s*)theme=light(;|$)/.test(document.cookie);
        var de = document.documentElement;
        de.style.background = dark ? '#0b1020' : '#f1f5f9';
        if (/\/ide\/?$/.test(window.location.pathname)) {
          de.classList.add('preload-ide');
        }
        // Mirrors skeletonColors() in src/components/Skeleton.tsx so the inline
        // shimmer matches the React skeletons that take over after mount.
        de.style.setProperty('--skeleton-base', dark ? '#1f2937' : '#e2e8f0');
        de.style.setProperty('--skeleton-highlight', dark ? '#334155' : '#f5f8fc');
        de.style.setProperty('--skeleton-border', dark ? '#1e293b' : '#e2e8f0');
      }());
    </script>
    <style>
      /* Pre-React loading state. The router hasn't booted yet, so this is a
         route-agnostic app shell (nav + content blocks). React's
         createRoot().render() replaces #root's children on mount, so it's
         removed automatically once the app boots and the per-route skeleton
         takes over. */
      #app-preloader { position: fixed; inset: 0; background: inherit; }
      #app-preloader .sk {
        display: block;
        border-radius: 6px;
        background: linear-gradient(
          90deg,
          var(--skeleton-base, #1f2937) 25%,
          var(--skeleton-highlight, #334155) 37%,
          var(--skeleton-base, #1f2937) 63%
        );
        background-size: 400% 100%;
        animation: app-shimmer 1.4s ease infinite;
      }
      #app-preloader .pl-nav {
        display: flex; align-items: center; justify-content: space-between;
        padding: 16px 32px;
        border-bottom: 1px solid var(--skeleton-border, #1e293b);
      }
      #app-preloader .pl-nav-right { display: flex; align-items: center; gap: 18px; }
      #app-preloader .pl-hero {
        display: flex; flex-direction: column; align-items: center;
        padding: 100px 24px 80px; gap: 18px;
      }
      #app-preloader .pl-ide { display: none; height: 100vh; flex-direction: column; overflow: hidden; }
      .preload-ide #app-preloader .pl-home { display: none; }
      .preload-ide #app-preloader .pl-ide { display: flex; }
      #app-preloader .pl-ide-row {
        display: flex; align-items: center; gap: 8px; padding: 0 12px;
        border-bottom: 1px solid var(--skeleton-border, #1e293b); flex-shrink: 0;
      }
      #app-preloader .pl-file-row { height: 44px; }
      #app-preloader .pl-debug-row { height: 40px; }
      #app-preloader .pl-tabs { display: flex; align-items: center; gap: 6px; flex: 1; min-width: 0; overflow: hidden; }
      #app-preloader .pl-main { flex: 1; min-height: 0; display: flex; overflow: hidden; }
      #app-preloader .pl-rail {
        width: 66px; flex-shrink: 0; display: flex; flex-direction: column; align-items: center;
        gap: 8px; padding: 8px 0; border-right: 1px solid var(--skeleton-border, #1e293b);
      }
      #app-preloader .pl-rail-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
      #app-preloader .pl-sidebar { width: 260px; flex-shrink: 0; display: flex; flex-direction: column; }
      #app-preloader .pl-sidebar-title { padding: 6px 10px; border-bottom: 1px solid var(--skeleton-border, #1e293b); }
      #app-preloader .pl-file-list { padding: 10px; display: flex; flex-direction: column; gap: 8px; }
      #app-preloader .pl-file-row-item { display: flex; align-items: center; gap: 8px; padding: 8px 2px; }
      #app-preloader .pl-side-handle { width: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
      #app-preloader .pl-editor { flex: 1; min-width: 0; display: flex; flex-direction: column; }
      #app-preloader .pl-code { height: 70%; display: flex; padding: 12px 0; gap: 12px; }
      #app-preloader .pl-gutter { width: 34px; display: flex; flex-direction: column; gap: 8px; align-items: flex-end; padding-right: 8px; }
      #app-preloader .pl-lines { flex: 1; display: flex; flex-direction: column; gap: 8px; padding-right: 14px; }
      #app-preloader .pl-console { flex: 1; padding: 10px; }
      #app-preloader .pl-editor-handle { height: 8px; display: flex; align-items: center; justify-content: center; }
      @keyframes app-shimmer {
        0% { background-position: 100% 50%; }
        100% { background-position: 0 50%; }
      }
      @media (prefers-reduced-motion: reduce) {
        #app-preloader .sk { animation: none; }
      }
    </style>
  </head>
